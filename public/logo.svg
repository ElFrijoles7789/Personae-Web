<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Background gradient rounded square -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="mask" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.8"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Theater mask (left half - comedy/tragedy combined) -->
  <!-- Left side: smiling comedy mask -->
  <path d="M 156 140 Q 156 120 176 120 L 240 120 Q 260 120 260 140 L 260 240 Q 260 300 208 340 Q 156 300 156 240 Z" fill="url(#mask)"/>
  <!-- Comedy mask eyes (happy curved) -->
  <path d="M 178 195 Q 190 210 202 195" stroke="#6366f1" stroke-width="8" stroke-linecap="round" fill="none"/>
  <path d="M 214 195 Q 226 210 238 195" stroke="#6366f1" stroke-width="8" stroke-linecap="round" fill="none"/>
  <!-- Comedy mask smile -->
  <path d="M 182 255 Q 208 285 234 255" stroke="#6366f1" stroke-width="9" stroke-linecap="round" fill="none"/>

  <!-- Right side: tragedy mask (mirror) -->
  <path d="M 356 140 Q 356 120 336 120 L 272 120 Q 252 120 252 140 L 252 240 Q 252 300 304 340 Q 356 300 356 240 Z" fill="url(#mask)" opacity="0.7"/>
  <!-- Tragedy mask eyes (sad slanted) -->
  <path d="M 274 200 L 298 188" stroke="#6366f1" stroke-width="8" stroke-linecap="round" fill="none"/>
  <path d="M 330 200 L 306 188" stroke="#6366f1" stroke-width="8" stroke-linecap="round" fill="none"/>
  <!-- Tragedy mask frown -->
  <path d="M 278 275 Q 304 255 330 275" stroke="#6366f1" stroke-width="9" stroke-linecap="round" fill="none"/>

  <!-- "P" letter at bottom -->
  <text x="256" y="450" font-family="Georgia, serif" font-size="100" font-weight="bold" fill="#ffffff" text-anchor="middle" opacity="0.9">P</text>
</svg>
